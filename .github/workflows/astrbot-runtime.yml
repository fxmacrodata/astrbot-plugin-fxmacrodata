name: Validate against AstrBot runtime

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  astrbot-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/checkout@v4
        with:
          repository: AstrBotDevs/AstrBot
          ref: v4.25.1
          path: .astrbot-runtime

      - name: Install AstrBot and plugin test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .astrbot-runtime -r requirements.txt pytest pytest-asyncio pytest-xdist

      - name: Import and register the plugin in AstrBot
        run: python -m pytest tests/test_astrbot_runtime.py -n 0 -rs
