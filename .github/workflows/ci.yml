name: Validate plugin

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install public plugin dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest pytest-asyncio pytest-xdist ruff

      - name: Run plugin tests
        run: python -m pytest tests -n 0

      - name: Lint public plugin source
        run: python -m ruff check .
